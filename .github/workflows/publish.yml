name: 'publish'

on:
  push:
    branches:
      - release
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust_targets: 'aarch64-apple-darwin'
            label: 'macos-arm64'

          - platform: windows-latest
            args: ''
            rust_targets: ''
            label: 'windows-x64'

          - platform: ubuntu-24.04
            args: ''
            rust_targets: ''
            label: 'linux-x64'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: install dependencies (ubuntu only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            patchelf

      - name: install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}
          components: clippy
          
      - name: Install wasm target + trunk
        run: |
          rustup target add wasm32-unknown-unknown
          cargo install --locked trunk --version 0.21.14
          
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: test
        run: cargo test --workspace

      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: build and publish (all desktop targets)
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: app-v__VERSION__
          releaseName: 'App v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          args: ${{ matrix.args }}

  verify-updater-manifest:
    needs: publish-desktop
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: verify signed updater manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version=$(jq -r .version src-tauri/tauri.conf.json)
          gh release download "app-v${version}" --pattern latest.json --dir updater-manifest
          jq -e --arg version "$version" '
            .version == $version and
            ((["darwin-aarch64", "linux-x86_64", "windows-x86_64"]
              - (.platforms | keys)) | length == 0) and
            ([.platforms[] |
              (.signature | length > 0) and
              (.url | startswith("https://"))] | all)
          ' updater-manifest/latest.json
